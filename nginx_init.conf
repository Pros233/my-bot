# Temporary HTTP-only config — used ONLY during certbot initial cert issuance.
# Overwritten by nginx_dashboard.conf after certbot completes.
server {
    listen 80;
    listen [::]:80;
    server_name mybot233.duckdns.org;
    root /var/www/html;

    # ACME HTTP-01 challenge for Let's Encrypt
    location /.well-known/acme-challenge/ {
        try_files $uri =404;
    }

    location / {
        return 200 "OK";
        add_header Content-Type text/plain;
    }
}
