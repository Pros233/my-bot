# /etc/nginx/sites-available/btcbot-dashboard
# BTC Bot read-only dashboard — Nginx reverse proxy.
#
# Requires:
#   /etc/nginx/.htpasswd          (created by setup_https.sh)
#   /etc/nginx/conf.d/dash-ratelimit.conf
#   Let's Encrypt certs from certbot (mybot233.duckdns.org)
#
# Flask stays bound to 127.0.0.1:8080 only.
# NEVER proxy any endpoint that executes trades.

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name mybot233.duckdns.org;

    # Allow Let's Encrypt HTTP-01 ACME challenge for renewals
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Everything else → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name mybot233.duckdns.org;

    # ── SSL (managed by certbot) ──────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/mybot233.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mybot233.duckdns.org/privkey.pem;

    # TLS hardening (inline — no dependency on certbot options files)
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers               "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384";
    ssl_session_cache         shared:le_nginx_SSL:10m;
    ssl_session_timeout       1440m;
    ssl_session_tickets       off;

    # ── Security headers ──────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options            "DENY"        always;
    add_header X-Content-Type-Options     "nosniff"     always;
    add_header Referrer-Policy            "no-referrer" always;
    add_header X-XSS-Protection           "1; mode=block" always;
    # Chart.js loaded from CDN; inline scripts/styles used in template
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self';"
        always;

    # ── HTTP Basic Auth (second auth layer on top of Flask session) ───────
    auth_basic           "BTC Bot — Authorised Access Only";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # ── Cloudflare real-IP support (safe even if CF not enabled) ─────────
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    real_ip_header    CF-Connecting-IP;

    # ── Block dangerous paths ─────────────────────────────────────────────
    # Hidden files and .git
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    # .env files (belt-and-suspenders — Flask never serves these)
    location ~ \.env$ {
        deny all;
        access_log off;
        log_not_found off;
    }
    # SQLite / database files
    location ~ \.(db|sqlite|sqlite3)$ {
        deny all;
        access_log off;
        log_not_found off;
    }
    # Log files
    location ~ \.log$ {
        deny all;
        access_log off;
        log_not_found off;
    }
    # Python source
    location ~ \.py$ {
        deny all;
        access_log off;
        log_not_found off;
    }
    # Shell scripts
    location ~ \.sh$ {
        deny all;
        access_log off;
        log_not_found off;
    }
    # Directory listing is off by default; make explicit
    autoindex off;

    # ── Rate-limit login page ─────────────────────────────────────────────
    location /login {
        limit_req zone=dash_login burst=3 nodelay;
        limit_req_status 429;
        proxy_pass         http://127.0.0.1:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── SSE live-event stream (disable buffering) ─────────────────────────
    location /api/events {
        proxy_pass         http://127.0.0.1:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding on;
    }

    # ── Main reverse proxy ────────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_read_timeout    60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
    }

    # ── Logging ───────────────────────────────────────────────────────────
    access_log /var/log/nginx/btcbot-access.log;
    error_log  /var/log/nginx/btcbot-error.log warn;
}
