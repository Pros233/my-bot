# /etc/fail2ban/jail.d/nginx-dashboard.conf
# Fail2ban jails for the BTC Bot dashboard Nginx proxy.

[nginx-http-auth]
# Ban IPs that fail HTTP Basic Auth on Nginx.
# Uses the built-in nginx-http-auth filter.
enabled  = true
port     = http,https
filter   = nginx-http-auth
logpath  = /var/log/nginx/btcbot-error.log
maxretry = 5
findtime = 600
bantime  = 3600
action   = iptables-multiport[name=nginx-http-auth, port="http,https", protocol=tcp]

[nginx-limit-req]
# Ban IPs that hit the rate limit (429) on /login.
# Uses the built-in nginx-limit-req filter.
enabled  = true
port     = http,https
filter   = nginx-limit-req
logpath  = /var/log/nginx/btcbot-error.log
maxretry = 3
findtime = 600
bantime  = 7200
action   = iptables-multiport[name=nginx-limit-req, port="http,https", protocol=tcp]

[nginx-botscan]
# Ban IPs scanning for common exploit paths.
enabled  = true
port     = http,https
filter   = nginx-4xx
logpath  = /var/log/nginx/btcbot-access.log
maxretry = 20
findtime = 300
bantime  = 86400
action   = iptables-multiport[name=nginx-botscan, port="http,https", protocol=tcp]
